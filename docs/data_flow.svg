<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">VMP Data Processing Pipeline</text>
  <text x="550" y="56" text-anchor="middle" font-size="11" fill="#666">rsi-tpw pipeline: .P files through SCOR-160 processing to depth-binned products</text>

  <!-- ════════ ROW 0: .P files -> Profile detection ════════ -->
  <rect x="40" y="76" width="140" height="44" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">.P files</text>
  <text x="110" y="110" text-anchor="middle" font-size="8" fill="#64748b">Rockland binary</text>

  <line x1="180" y1="98" x2="238" y2="98" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="209" y="91" text-anchor="middle" font-size="8" fill="#666">PFile</text>

  <rect x="242" y="76" width="200" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="342" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Profile detection</text>
  <text x="342" y="108" text-anchor="middle" font-size="8" fill="#15803d">get_profiles() on slow P</text>

  <!-- ════════ L1 ════════ -->
  <line x1="442" y1="98" x2="498" y2="98" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="502" y="76" width="240" height="44" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="622" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">L1 — Converted</text>
  <text x="622" y="108" text-anchor="middle" font-size="8" fill="#15803d">pfile_to_l1data() · physical units · in-memory</text>

  <!-- In-memory indicator -->
  <rect x="748" y="81" width="56" height="16" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="776" y="92" text-anchor="middle" font-size="7" fill="#64748b">in-memory</text>

  <line x1="622" y1="120" x2="622" y2="150" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ════════ L2 ════════ -->
  <rect x="502" y="154" width="240" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="622" y="171" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">L2 — Cleaned</text>
  <text x="622" y="186" text-anchor="middle" font-size="8" fill="#a16207">process_l2() · HP filter, despike · in-memory</text>

  <rect x="748" y="159" width="56" height="16" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="776" y="170" text-anchor="middle" font-size="7" fill="#64748b">in-memory</text>

  <!-- ════════ BRANCHES FROM L2 ════════ -->

  <!-- Left branch: L2 -> epsilon chain (shear spectra) -->
  <path d="M 502,176 L 230,176 L 230,240" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Right branch: L2 -> chi chain (L2_chi cleaning) -->
  <path d="M 742,176 L 820,176 L 820,240" fill="none" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ════════════════════════════════════════════════ -->
  <!-- COLUMN 1: Epsilon chain (left, purple) -->
  <!-- ════════════════════════════════════════════════ -->

  <text x="230" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">Epsilon chain (SCOR-160)</text>

  <!-- L3_spectra -->
  <rect x="80" y="248" width="300" height="48" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">L3 — Shear spectra</text>
  <text x="230" y="282" text-anchor="middle" font-size="8" fill="#be185d">process_l3() · Welch + Goodman · in-memory</text>

  <rect x="386" y="253" width="56" height="16" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="414" y="264" text-anchor="middle" font-size="7" fill="#64748b">in-memory</text>

  <line x1="230" y1="296" x2="230" y2="324" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- L4_dissipation -->
  <rect x="80" y="328" width="300" height="48" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">L4 — Epsilon</text>
  <text x="230" y="362" text-anchor="middle" font-size="8" fill="#6d28d9">process_l4() · Nasmyth fit · var/ISR method</text>

  <!-- L4_epsilon.nc file indicator -->
  <rect x="386" y="333" width="90" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="431" y="344" text-anchor="middle" font-size="7" fill="#1d4ed8">L4_epsilon.nc</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- COLUMN 2: Chi chain (right, cyan/orange) -->
  <!-- ════════════════════════════════════════════════ -->

  <text x="820" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#0e7490">Chi chain</text>

  <!-- L2_chi -->
  <rect x="660" y="248" width="320" height="48" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e7490">L2_chi — Temp cleaning</text>
  <text x="820" y="282" text-anchor="middle" font-size="8" fill="#0891b2">process_l2_chi() · despike T, compute dT/dz · in-memory</text>

  <line x1="820" y1="296" x2="820" y2="324" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- L3_chi -->
  <rect x="660" y="328" width="320" height="48" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#075985">L3_chi — Gradient spectra</text>
  <text x="820" y="362" text-anchor="middle" font-size="8" fill="#0369a1">process_l3_chi() · Welch + Goodman + FP07 · in-memory</text>

  <!-- Branch from L3_chi to two chi methods -->
  <path d="M 735,376 L 620,420" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <path d="M 905,376 L 950,420" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ════════════════════════════════════════════════ -->
  <!-- Chi Method 1 (center, orange) -->
  <!-- ════════════════════════════════════════════════ -->

  <text x="620" y="416" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a3412">Method 1 (chi from epsilon)</text>

  <!-- Cross-chain arrow from L4_epsilon to L4_chi_epsilon -->
  <path d="M 380,352 L 488,420" fill="none" stroke="#ea580c" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="416" y="382" text-anchor="middle" font-size="8" fill="#ea580c">+ epsilon</text>

  <!-- L4_chi_epsilon -->
  <rect x="490" y="424" width="260" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="444" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">L4_chi_epsilon</text>
  <text x="620" y="458" text-anchor="middle" font-size="8" fill="#c2410c">process_l4_chi_epsilon() · Batchelor/Kraichnan fit</text>

  <rect x="756" y="429" width="108" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="810" y="440" text-anchor="middle" font-size="7" fill="#1d4ed8">L4_chi_epsilon.nc</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- Chi Method 2 (right, green) -->
  <!-- ════════════════════════════════════════════════ -->

  <text x="950" y="416" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">Method 2 (optional)</text>

  <!-- L4_chi_fit -->
  <rect x="870" y="424" width="200" height="48" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="970" y="444" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">L4_chi_fit</text>
  <text x="970" y="458" text-anchor="middle" font-size="8" fill="#047857">process_l4_chi_fit() · MLE/iterative</text>

  <rect x="874" y="477" width="86" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="917" y="488" text-anchor="middle" font-size="7" fill="#1d4ed8">L4_chi_fit.nc</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- L5 Binning -->
  <!-- ════════════════════════════════════════════════ -->

  <!-- Arrows from L4_epsilon and L4_chi_epsilon to L5 -->
  <path d="M 230,376 L 230,536" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <path d="M 620,472 L 450,536" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <rect x="120" y="540" width="420" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">L5 — Depth-binned</text>
  <text x="330" y="574" text-anchor="middle" font-size="8" fill="#b45309">bin_by_depth() · epsilon + chi merged · 1 dbar bins</text>

  <rect x="546" y="545" width="76" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="584" y="556" text-anchor="middle" font-size="7" fill="#1d4ed8">L5_binned.nc</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- L6 Combined -->
  <!-- ════════════════════════════════════════════════ -->

  <line x1="330" y1="588" x2="330" y2="620" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="330" y="614" text-anchor="middle" font-size="8" fill="#666">all profiles</text>

  <rect x="120" y="624" width="420" height="40" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="649" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0e7ff">L6 — Combined</text>

  <rect x="546" y="631" width="96" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="594" y="642" text-anchor="middle" font-size="7" fill="#1d4ed8">L6_combined.nc</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- Modular commands (right side) -->
  <!-- ════════════════════════════════════════════════ -->

  <rect x="660" y="540" width="400" height="130" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="860" y="560" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Modular commands (alternative to pipeline)</text>

  <text x="680" y="580" font-size="9" fill="#444"><tspan font-weight="bold" fill="#334155">rsi-tpw nc</tspan>   .P -> full-record .nc</text>
  <text x="680" y="598" font-size="9" fill="#444"><tspan font-weight="bold" fill="#334155">rsi-tpw prof</tspan> .P/.nc -> per-profile .nc</text>
  <text x="680" y="616" font-size="9" fill="#444"><tspan font-weight="bold" fill="#334155">rsi-tpw eps</tspan>  .P/.nc -> *_eps.nc per profile</text>
  <text x="680" y="634" font-size="9" fill="#444"><tspan font-weight="bold" fill="#334155">rsi-tpw chi</tspan>  .P/.nc -> *_chi.nc per profile</text>
  <text x="680" y="656" font-size="9" fill="#444"><tspan font-weight="bold" fill="#334155">rsi-tpw ql/dl</tspan>  .P -> interactive matplotlib viewers</text>

  <!-- ════════ LEGEND ════════ -->
  <rect x="40" y="700" width="1020" height="56" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="720" font-size="10" font-weight="bold" fill="#334155">Legend:</text>

  <rect x="120" y="712" width="14" height="10" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="140" y="721" font-size="9" fill="#444">Epsilon chain</text>

  <rect x="240" y="712" width="14" height="10" rx="2" fill="#ecfeff" stroke="#0891b2" stroke-width="1"/>
  <text x="260" y="721" font-size="9" fill="#444">Chi cleaning</text>

  <rect x="340" y="712" width="14" height="10" rx="2" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="360" y="721" font-size="9" fill="#444">Chi spectra</text>

  <rect x="440" y="712" width="14" height="10" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="460" y="721" font-size="9" fill="#444">Chi Method 1</text>

  <rect x="560" y="712" width="14" height="10" rx="2" fill="#ecfdf5" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="580" y="721" font-size="9" fill="#444">Chi Method 2 (opt.)</text>

  <line x1="690" y1="717" x2="710" y2="717" stroke="#444" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="718" y="721" font-size="9" fill="#444">Cross-chain dep.</text>

  <rect x="820" y="712" width="14" height="10" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="840" y="721" font-size="9" fill="#444">In-memory (no file)</text>

  <rect x="950" y="712" width="14" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="970" y="721" font-size="9" fill="#444">NetCDF output</text>

  <!-- Scope note -->
  <rect x="40" y="770" width="1020" height="36" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="550" y="790" text-anchor="middle" font-size="10" fill="#0369a1">L1–L3 are in-memory processing steps. L4 files are per-profile. L5 merges epsilon + chi per profile. L6 combines all profiles per .P file.</text>

  <!-- Per-profile scope -->
  <rect x="72" y="236" width="916" height="268" rx="8" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="540" y="502" text-anchor="middle" font-size="9" fill="#94a3b8">per profile</text>
</svg>
