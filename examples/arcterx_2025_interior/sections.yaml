# sections file for ARCTERX-2025's interior work, consumed by the `perturb-plot`
# subcommands (scalar / profiles / epsilon / chi / mixing) via `--sections`.
#
# A "section" only chops the CTD trajectory and chooses the x-axis: a name, an
# optional UTC time window, and an `xaxis` method with its parameters. Which
# variables, bin sizes, and colour limits to render are separate CLI flags
# (e.g. --var, --z-bin, --depth-max) that apply to every section here.
#
# Usage (omit --out-dir to show the figures on screen instead of writing PNGs):
#   perturb-plot scalar --root <results_root> \
#       --sections examples/arcterx_2025_interior/sections.yaml \
#       --out-dir figs/ --var JAC_T --var SP --var sigma0
#
# x-axis methods: time | latitude | longitude | distance_from_point | along_line
#                 | signed_distance
# Distance units: m | km | nm   (default km). Waypoints / points are [lat, lon].
#
# Honesty note: `time` is the only non-aliasing x-axis. The spatial axes assume
# a single monotonic transect; a re-occupied location is averaged into one
# column (intended only for a cast's own down/up legs meeting at the turn).

sections:
  # Whole deployment as a time series of the default scalars.
  - name: full_timeseries
    xaxis: {method: latitude}

  # First test cast
  - name: section_0
    start: "2025-02-01T02:00:00Z"
    stop:  "2025-02-01T04:00:00Z"
    xaxis: {method: latitude}

  # Second batch of 8 casts
  - name: section_1
    start: "2025-02-04T11:00:00Z"
    stop:  "2025-02-05T00:00:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Third batch of 4 casts
  - name: section_2
    start: "2025-02-05T11:30:00Z"
    stop:  "2025-02-05T18:30:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Fourth batch of 7 casts
  - name: section_3
    start: "2025-02-11T14:00:00Z"
    stop:  "2025-02-11T20:10:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Fourth batch of 7 casts
  - name: section_4
    start: "2025-02-11T21:00:00Z"
    stop:  "2025-02-12T02:00:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Fifth batch of 8 casts
  - name: section_5
    start: "2025-02-14T13:00:00Z"
    stop:  "2025-02-14T17:02:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Fifth batch of 8 casts
  - name: section_6
    start: "2025-02-14T17:13:00Z"
    stop:  "2025-02-14T20:47:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Fifth batch of 8 casts
  - name: section_7
    start: "2025-02-14T20:57:00Z"
    stop:  "2025-02-15T01:00:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Sixth batch of 4 casts
  - name: section_8
    start: "2025-02-17T16:00:00Z"
    stop:  "2025-02-18T00:00:00Z"
    xaxis:
      method: signed_distance
      units: km

  # Final cast
  - name: section_9
    start: "2025-02-19T15:00:00Z"
    stop:  "2025-02-19T18:00:00Z"
    xaxis: {method: latitude}
