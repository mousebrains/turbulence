[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "rsi-python"
version = "0.2.0"
description = "Tools for reading Rockland Scientific microprofiler .P files and converting to NetCDF"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
readme = "README.md"
authors = [
    { name = "Pat Welch", email = "pat@mousebrains.com" },
]
keywords = ["oceanography", "turbulence", "microprofiler", "rockland"]
dependencies = [
    "numpy>=1.26,<3",
    "netCDF4>=1.6,<2",
    "scipy>=1.12,<2",
    "xarray>=2024.1",
    "gsw>=3.6,<4",
    "ruamel.yaml>=0.18",
    "matplotlib>=3.8,<4",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "pytest-xdist",
    "ruff",
    "mypy",
]

[project.urls]
Repository = "https://github.com/mousebrains/rsi-python"

[project.scripts]
rsi-tpw = "rsi_python.cli:main"
perturb = "perturb.cli:main"
scor160 = "scor160.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "SIM", "RUF"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
check_untyped_defs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "rsi_python.spectral",
    "rsi_python.ocean",
    "rsi_python.nasmyth",
    "rsi_python.deconvolve",
    "rsi_python.profile",
    "rsi_python.helpers",
    "rsi_python.convert",
    "chi_tpw.batchelor",
    "chi_tpw.fp07",
    "chi_tpw.chi",
]
# npt.ArrayLike causes many false positives with arithmetic/indexing;
# no-any-return from numpy arithmetic expressions returning Any
disable_error_code = ["operator", "index", "arg-type", "return-value", "no-any-return", "assignment"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "matlab: MATLAB/ODAS comparison tests (use -n auto to parallelize)",
]
