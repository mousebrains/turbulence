[build-system]
requires = ["setuptools>=64", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "rsi-python"
version = "0.1.0"
description = "Tools for reading Rockland Scientific microprofiler data and computing turbulent dissipation rates"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
dependencies = [
    "numpy",
    "netCDF4",
    "scipy",
    "xarray",
    "gsw",
    "ruamel.yaml>=0.18",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]

[project.scripts]
rsi-tpw = "rsi_python.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.mypy]
python_version = "3.12"
warn_return_any = false
check_untyped_defs = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "rsi_python.batchelor",
    "rsi_python.fp07",
    "rsi_python.spectral",
    "rsi_python.dissipation",
    "rsi_python.ocean",
]
# npt.ArrayLike causes many false positives with arithmetic/indexing
disable_error_code = ["operator", "index", "arg-type", "return-value"]

[tool.pytest.ini_options]
testpaths = ["tests"]
