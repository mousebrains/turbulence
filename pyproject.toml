[build-system]
requires = ["setuptools>=64", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "rsi-python"
version = "0.1.0"
description = "Tools for reading Rockland Scientific microprofiler data and computing turbulent dissipation rates"
requires-python = ">=3.10"
license = "GPL-3.0-or-later"
dependencies = [
    "numpy",
    "netCDF4",
    "scipy",
    "xarray",
    "gsw",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[project.scripts]
rsi-tpw = "rsi_python.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
