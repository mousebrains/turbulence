[build-system]
requires = ["setuptools>=64", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "rsi-python"
version = "0.1.0"
description = "Tools for reading Rockland Scientific microprofiler data and computing turbulent dissipation rates"
requires-python = ">=3.10"
license = "GPL-3.0-or-later"
dependencies = [
    "numpy",
    "netCDF4",
    "scipy",
    "xarray",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[project.scripts]
rsi = "rsi_python.cli:main"
p2nc = "rsi_python.cli:p2nc"
pinfo = "rsi_python.cli:pinfo"
p2prof = "rsi_python.cli:p2prof"
p2eps = "rsi_python.cli:p2eps"
p2chi = "rsi_python.cli:p2chi"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
