# Example figure spec — binned (bin, profile) products. Copy and edit.
#   perturb-plot figure --spec this.yaml
# One preset per product: profiles | epsilon | chi | mixing (no --product).
# Override the source config from the CLI to compare runs, e.g.:
#   perturb-plot figure --spec this.yaml --config perturb.2.yaml --output-dir figs/run2
source:
  config: perturb.yaml

output_dir: figs/

figures:
  - name: profiles
    preset: profiles
    # 3x3 overview (temperatures / water-mass / kinematics + stratification).
    vars: [JAC_T, T1, T2, SP, rho, sigma0, W_slow, dTdz, N2]
    ncols: 3
  - name: epsilon
    preset: epsilon
    # 3-column overview (kinematics / window means / dissipation + stratification).
    vars: [speed, nu, T_mean, e_1, e_2, epsilonMean, N2, dTdz]
    ncols: 3
  - name: chi
    preset: chi
    # 3-column overview (kinematics / window means / chi / stratification / QC).
    vars: [speed, nu, T_mean, chi_1, chi_2, chiMean, N2, dTdz, qc_drop_chi]
    ncols: 3
  - name: mixing
    preset: mixing
    vars: [K_T, Gamma, K_rho]
    p_max: 200
